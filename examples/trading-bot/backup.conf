# Example backup config — for lib/backup-to-s3.sh
#
# Usage:
#   0 * * * * BACKUP_CONF=/path/to/this/file /path/to/claude-ops/lib/backup-to-s3.sh

BUCKET="s3://my-bucket-backups"
SOURCE_DIR="$HOME/my-trading-bot"

# Glob patterns relative to SOURCE_DIR. Missing files are silently skipped.
PATTERNS=(
    "trades_*.json"
    "state.json"
    "data/*.csv"
)

PREFIX="trading-bot"
LOG="/tmp/backup.log"
