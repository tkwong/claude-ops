# Example agent config — copy to ~/.claude-ops/agents/<name>.conf
#
# Place at: ~/.claude-ops/agents/trading-bot.conf
# Then: agops start trading-bot

PROJECT_DIR="$HOME/my-trading-bot"

# What to run inside tmux. Common patterns:
#   COMMAND="claude"                            # Claude Code interactive
#   COMMAND="claude --dangerously-skip-permissions"  # CI-style auto-approve
#   COMMAND="bun run server.ts"                 # Custom MCP/agent runner
COMMAND="claude"

# Where to tee output. Default: /tmp/<name>.log
LOG_FILE="/tmp/trading-bot.log"
